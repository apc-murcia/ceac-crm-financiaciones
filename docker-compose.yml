version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ceac_crm_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestion_financiaciones}
      POSTGRES_USER: ${POSTGRES_USER:-ceac_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ceac_admin} -d ${POSTGRES_DB:-gestion_financiaciones}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceac_crm_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ceac_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gestion_financiaciones}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
